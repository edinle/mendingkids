name: Sync to Vercel Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout team repo
        uses: actions/checkout@v3

      - name: Push to Vercel repo
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync-bot@example.com"

          git remote add vercel https://x-access-token:${{ secrets.VERCEL_REPO_TOKEN }}@github.com/edinle/mendingkidsdesign.git
          
          git push vercel main --force
